name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Validate and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate repository cases
        run: mech-eval validate .

      - name: Check Python source
        run: python -m ruff check .

      - name: Validate AI management system
        run: python -m mech_eval_harness.ai_governance .

      - name: Run pre-first-run regression with coverage floor
        run: python -m pytest --ignore=tests/test_held_out_package_fixtures.py --cov=mech_eval_harness --cov-report=term-missing --cov-fail-under=80
